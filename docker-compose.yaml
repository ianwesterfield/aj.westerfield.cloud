networks:
  webtools_network:
    external: true

secrets:
  huggingface_pat:
    file: ./secrets/huggingface_pat.txt
  funnel_local_agent_host:
    file: ./secrets/funnel_local_agent_host.txt
  funnel_gossip_seed_host:
    file: ./secrets/funnel_gossip_seed_host.txt

services:
  # -------------------------------------------------
  # Local LLM: llama.cpp llama-server
  # -------------------------------------------------
  # llama-server runs OUTSIDE docker, directly on the WSL2 host, so it can
  # expose the RTX 4090 via CUDA without the container GPU-passthrough hit.
  # Managed by scripts/start-llama-server.sh (tmux) or a WSL systemd unit.
  # Default endpoint: http://localhost:8081  (OpenAI-compatible)
  #
  # All containers below reach it via localhost since they use network_mode: host.
  # -------------------------------------------------

  # -------------------------------------------------
  # (DEPRECATED) Ollama local fallback — kept for reference only.
  # llama-server replaced this as the primary inference runtime (see above).
  # Uncomment to re-enable if you need Ollama-specific features.
  # -------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   network_mode: host
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #     - OLLAMA_KEEP_ALIVE=-1
  #     - OLLAMA_NUM_PARALLEL=1
  #     - OLLAMA_MAX_LOADED_MODELS=1
  #   volumes:
  #     - /mnt/c/docker-data/ollama/.ollama:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   shm_size: 2g
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
  #     interval: 60s
  #     timeout: 30s
  #     retries: 3
  #     start_period: 30s

  # -------------------------------------------------
  # Qdrant
  # -------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    network_mode: host
    environment:
      - QDRANT__LOG_LEVEL=DEBUG
      # Flush WAL more frequently to reduce corruption risk on shutdown
      - QDRANT__STORAGE__OPTIMIZERS__FLUSH_INTERVAL_SEC=1
    volumes:
      - /mnt/c/docker-data/qdrant/storage:/qdrant/storage
    restart: unless-stopped
    # Give Qdrant time to flush WAL and close cleanly
    stop_grace_period: 30s

  # -------------------------------------------------
  # Memory API (Memory + Agent Core)
  # -------------------------------------------------
  memory_api:
    build:
      context: ./layers
      dockerfile: memory/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-ianwesterfield}
    container_name: memory_api
    network_mode: host
    environment:
      - QDRANT_HOST=localhost
      - QDRANT_PORT=6333
      - INDEX_NAME=user_memory_collection
      - EMBEDDING_PROVIDER=sentence_transformers # Keep ST for embeddings (768-dim, fast)
      # LLM inference goes to local llama.cpp llama-server on the WSL host.
      # LLM_BASE_URL is the preferred env var; OLLAMA_BASE_URL is accepted for
      # backwards compatibility by the same services.
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - LLM_MODEL=${LLM_MODEL:-ajr1-32b}
      - OLLAMA_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - OLLAMA_MODEL=${LLM_MODEL:-ajr1-32b}
      - SUMMARY_MODEL=sshleifer/distilbart-cnn-12-6
      - SUMMARY_DEVICE=0
      - HF_HOME=/models
      - HF_TOKEN_FILE=/run/secrets/huggingface_pat
      - FILTERS_PATH=/filters
    secrets:
      - huggingface_pat
    volumes:
      - /mnt/c/docker-data/models:/models
      - ./filters:/filters:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  # -------------------------------------------------
  # Pragmatics API
  # Intent classification: DistilBERT (CPU, baked into image)
  # Memory summarization: Uses main Ollama model
  # -------------------------------------------------
  pragmatics_api:
    build:
      context: ./layers
      dockerfile: pragmatics/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-ianwesterfield}
    container_name: pragmatics_api
    network_mode: host
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - LLM_MODEL=${LLM_MODEL:-ajr1-32b}
      - OLLAMA_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - OLLAMA_MODEL=${LLM_MODEL:-ajr1-32b}
    # Inference runs on the WSL host (llama-server), not in docker.
    restart: unless-stopped

  # -------------------------------------------------
  # Extractor API (Media -> Text)
  # -------------------------------------------------
  extractor_api:
    build:
      context: ./layers/extractor
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-ianwesterfield}
    container_name: extractor_api
    network_mode: host
    environment:
      - WHISPER_MODEL=large-v3
      - IMAGE_MODEL=llava # Options: llava-4bit (~4GB), llava (~14GB), florence (~4GB)
      - HF_HOME=/models
      - HF_TOKEN_FILE=/run/secrets/huggingface_pat
    secrets:
      - huggingface_pat
    volumes:
      - /mnt/c/docker-data/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # -------------------------------------------------
  # Orchestrator API (.NET) - Agentic Reasoning + Execution Engine
  # Includes embedded FunnelCloud Agent for localhost bootstrap
  # -------------------------------------------------
  orchestrator_api:
    build:
      context: ./layers/orchestrator-dotnet
      dockerfile: Dockerfile
    container_name: orchestrator_api
    network_mode: host
    environment:
      # .NET Core configuration
      - ASPNETCORE_URLS=http://+:8004
      - ASPNETCORE_ENVIRONMENT=Production
      # LLM inference: local llama.cpp llama-server on the WSL host.
      # The app also reads LLM_BASE_URL / LLM_MODEL directly from env; the
      # Ollama__* keys below are for legacy appsettings binding compatibility.
      - Llm__Url=${LLM_BASE_URL:-http://localhost:8081}
      - Llm__Model=${LLM_MODEL:-ajr1-32b}
      - Ollama__Url=${LLM_BASE_URL:-http://localhost:8081}
      - Ollama__Model=${LLM_MODEL:-ajr1-32b}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - LLM_MODEL=${LLM_MODEL:-ajr1-32b}
      - OLLAMA_BASE_URL=${LLM_BASE_URL:-http://localhost:8081}
      - OLLAMA_MODEL=${LLM_MODEL:-ajr1-32b}
      # Pragmatics API for intent classification
      - Pragmatics__Url=http://localhost:8001
      - PRAGMATICS_API_URL=http://localhost:8001
      # FunnelCloud agent discovery (use WSL gateway IP to reach Windows host)
      - FunnelCloud__Url=http://172.25.224.1:41421
      # Gossip seed for cross-subnet agent discovery
      - FunnelCloud__GossipSeedHost=192.168.10.166
      # Skills paths (mounted volume)
      - Skills__Paths__0=/skills
    volumes:
      - ./skills:/skills:ro
    depends_on:
      memory_api:
        condition: service_started
    # No local ollama dependency - uses remote Blackwell via OLLAMA_REMOTE_URL
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8004/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------------
  # Open-WebUI
  # Chat + RAG UI. Talks to llama-server via its OpenAI-compatible endpoint.
  # RAG embeddings now come from Open-WebUI's bundled sentence-transformers
  # (local, CPU) since llama-server only serves the 32B chat model and bge-large
  # isn't loaded. Re-enable the Ollama service above + flip these envs back to
  # ollama if you want the old Ollama-embedded RAG path.
  # -------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - USER_AGENT=WesterfieldCloud-OpenWebUI/1.0
      - GLOBAL_LOG_LEVEL=DEBUG
      - DEFAULT_MODELS=${LLM_MODEL:-ajr1-32b}
      # Primary inference via llama-server (OpenAI-compatible).
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=${LLM_BASE_URL:-http://172.17.0.1:8081}/v1
      - OPENAI_API_KEY=sk-local-llamacpp
      # Ollama connector disabled by default; re-enable if you run Ollama.
      - ENABLE_OLLAMA_API=false
      # RAG: use Open-WebUI's built-in sentence-transformers (local, CPU).
      - RAG_EMBEDDING_ENGINE=
      - ENABLE_API_KEY=true
      - MEMORY_ENABLED=true
      - MEMORY_SHORT_TERM_MEMORY_DEPTH=15
      - TOOLS_FUNCTION_CALLING_ENABLED=true
      - MEMORY_API_URL=http://172.17.0.1:8000
      - TOOLS_DISCOVERY_URL=http://172.17.0.1:8000/api/tools
      # Orchestrator for AJ filter task execution
      - ORCHESTRATOR_API_URL=http://172.17.0.1:8004
      # Pragmatics for AJ filter intent classification
      - PRAGMATICS_API_URL=http://172.17.0.1:8001
      # Extractor for AJ filter media extraction
      - EXTRACTOR_API_URL=http://172.17.0.1:8002
      # FunnelCloud tray app for event notifications (Windows host IP from WSL2)
      - TRAY_EVENT_URL=${TRAY_EVENT_URL:-http://172.25.224.1:6666}
    ports:
      - "8180:8080" # Host 8180 -> Container 8080 (8080 often reserved by Windows/Hyper-V)
    volumes:
      - /mnt/c/docker-data/open-webui/data:/app/backend/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    restart: unless-stopped
    networks:
      - webtools_network
