# Llama-3.3-70B-Instruct LoRA training on RTX PRO 6000 Blackwell (96GB VRAM)
# AJ-Llama33-70B-v3.0.0-lora
#
# VRAM budget (8-bit, LoRA, 10k ctx on 96GB):
#   Weights 8-bit:                         ~70 GB
#   LoRA (r=64, ~all linear target):       ~1.5 GB
#   Paged 8-bit optimizer states:          ~2 GB
#   Activations @ bs=1, 10240 ctx + ckpt:  ~15-18 GB
#   Total budget:                          ~88-91 GB  (tight; bs=1 + grad_accum mandatory)
#
# Fallback if OOM: switch load_in_8bit -> load_in_4bit (saves ~35 GB).

# Model
model_name: "meta-llama/Llama-3.3-70B-Instruct"
output_dir: "./AJ-Llama33-70B-v3.0.0-lora"

# Dataset (generated by prepare_mixed_v1.py with Llama-3.3 DOMAIN_KNOWLEDGE_FILES update)
train_file: "datasets/processed/mixed_v1.train.jsonl"
eval_file: "datasets/processed/mixed_v1.eval.jsonl"

# Quantization (bitsandbytes)
# First attempt was load_in_8bit: true, which OOM'd at step 0 (94.93/94.97 GB full,
# 252 MiB free when activations hit). Switched to 4-bit NF4 to free ~35 GB for
# activations + paged optimizer states.
load_in_8bit: false
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: "bfloat16"
# Kept for backwards-compat with earlier runs; unused when load_in_4bit is true:
bnb_8bit_compute_dtype: "bfloat16"

# LoRA
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Batch sizes (bs=1 mandatory at 8-bit + 10k ctx on 96GB)
# Effective batch = batch_size * grad_accum = 16
batch_size: 1
gradient_accumulation_steps: 16

# Training duration
# With orchestrator files weighted 3x and bs=1/ga=16 on a ~300k mixed corpus,
# 2 epochs gives the skill-context + 4-tool schema enough exposure to saturate.
num_epochs: 2
max_steps: -1

# Optimizer
learning_rate: 1.0e-4 # higher than dense bf16 (2e-5) because LoRA + quantized base
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
optim: "paged_adamw_8bit" # paged states fit in 96GB alongside 8-bit weights

# Memory
gradient_checkpointing: true

# Sequence length
max_seq_length: 10240

# Logging & checkpoints
logging_steps: 10
save_steps: 500
eval_steps: 500

# Chat template (applied in train_llama33_70b.py via tokenizer.apply_chat_template)
chat_template: "llama3"

# Versioning
version: "v3.0.0-lora"
dataset_version: "mixed_v1"
base_model_code: "Llama33-70B"

# Notes on composition (populated by prepare_mixed_v1.py DATASET_MIX + FILE_WEIGHTS):
#   50% Conversational (WildChat + UltraChat)
#   40% Domain knowledge, including v3.0.0 additions weighted 3x:
#     - funnelcloud_tools.jsonl        (388 skill-aware tool-calling examples)
#     - orchestrator_workflows.jsonl   (405 multi-step admin workflows)
#     - final_answer_formatting.jsonl  (407 markdown complete.answer examples)
#     - context_switching.jsonl        (existing, 3x - contextType signal)
#   10% Strategic reasoning (Skein)
