name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r layers/pragmatics/requirements.txt
          pip install -r layers/memory/requirements.txt
          pip install -r layers/extractor/requirements.txt

      - name: Run Python unit tests
        run: |
          pytest tests/test_filter_logic.py tests/test_guardrails.py tests/test_manchurian_candidate.py -v --tb=short

  test-dotnet:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Run .NET tests
        run: dotnet test AJ.sln --verbosity normal
