name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r layers/requirements.txt
          pip install -r layers/pragmatics/requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_e2e_*.py \
            --cov=layers/pragmatics --cov-report=term-missing
