[tool.pytest.ini_options]
pythonpath = [
    "layers/pragmatics",
    "layers/memory",
    "layers/extractor",
]
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests requiring a running orchestrator",
]
# E2E tests use a shared orchestrator - ensure sequential execution
# Tests are ordered alphabetically by default; use -p no:randomly if randomization is enabled
asyncio_default_fixture_loop_scope = "function"
# Prevent parallel execution (if xdist is ever installed)
addopts = "-p no:xdist"
